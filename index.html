<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>百货小店</title>
    <meta name="description" content="百货小店 · 申请入驻 LDC 生态" />
    <meta name="apple-mobile-web-app-title" content="百货小店" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="./styles.css" />

    <!-- 主题预设：避免 FOUC -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          var theme =
            saved && saved !== "system"
              ? saved
              : prefersDark
                ? "dark"
                : "light";
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div class="app-root">
      <!-- ============ Header ============ -->
      <header class="site-header">
        <div class="container header-inner">
          <div class="header-left">
            <a class="brand" href="./">
              <span class="brand-logo" aria-hidden="true">百</span>
              <span class="brand-name">百货小店</span>
            </a>
            <nav class="header-nav">
              <a href="#" data-action="ldc-nav">LDC Nav</a>
            </nav>
          </div>

          <div class="header-right">
            <nav class="action-pill">
              <button
                type="button"
                class="action-btn lang-btn"
                title="Language"
                aria-label="Language"
                data-action="lang"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="icon"
                  aria-hidden="true"
                >
                  <path d="m5 8 6 6"></path>
                  <path d="m4 14 6-6 2-3"></path>
                  <path d="M2 5h12"></path>
                  <path d="M7 2h1"></path>
                  <path d="m22 22-5-10-5 10"></path>
                  <path d="M14 18h6"></path>
                </svg>
                <span class="lang-label">EN</span>
              </button>

              <button
                type="button"
                class="action-btn theme-btn"
                title="Toggle theme"
                aria-label="Toggle theme"
                data-action="theme"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="icon icon-sun"
                  aria-hidden="true"
                >
                  <circle cx="12" cy="12" r="4"></circle>
                  <path d="M12 2v2"></path>
                  <path d="M12 20v2"></path>
                  <path d="m4.93 4.93 1.41 1.41"></path>
                  <path d="m17.66 17.66 1.41 1.41"></path>
                  <path d="M2 12h2"></path>
                  <path d="M20 12h2"></path>
                  <path d="m6.34 17.66-1.41 1.41"></path>
                  <path d="m19.07 4.93-1.41 1.41"></path>
                </svg>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="icon icon-moon"
                  aria-hidden="true"
                >
                  <path
                    d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
                  ></path>
                </svg>
              </button>

              <button
                type="button"
                class="action-btn signin-btn"
                data-action="signin"
              >
                Sign in
              </button>

              <div class="user-menu" data-user-menu hidden>
                <button
                  type="button"
                  class="user-trigger"
                  data-action="user-trigger"
                  aria-haspopup="menu"
                  aria-expanded="false"
                >
                  <img
                    class="user-avatar"
                    alt=""
                    referrerpolicy="no-referrer"
                    data-user-avatar
                  />
                  <span class="user-name" data-user-name></span>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="user-caret"
                    aria-hidden="true"
                  >
                    <path d="m6 9 6 6 6-6" />
                  </svg>
                </button>

                <div class="user-popover" data-user-popover>
                  <div class="user-popover-header">
                    <img
                      class="user-popover-avatar"
                      alt=""
                      referrerpolicy="no-referrer"
                      data-user-avatar
                    />
                    <div class="user-popover-meta">
                      <div class="user-popover-name" data-user-name></div>
                      <div
                        class="user-popover-email"
                        data-user-email
                      ></div>
                    </div>
                  </div>
                  <div class="user-popover-body">
                    <div class="user-trust">
                      <span class="user-trust-label" data-trust-label
                        >Trust Level</span
                      >
                      <span class="user-trust-value" data-user-trust></span>
                    </div>
                  </div>
                  <button
                    type="button"
                    class="user-logout"
                    data-action="logout"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                    >
                      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                      <polyline points="16 17 21 12 16 7" />
                      <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span data-logout-label>退出登录</span>
                  </button>
                </div>
              </div>
            </nav>
          </div>
        </div>
      </header>

      <!-- ============ Main ============ -->
      <main class="container main-content">
        <!-- Hero -->
        <section class="hero-card">
          <div class="hero-bg"></div>
          <div class="hero-line"></div>
          <div class="hero-inner">
            <div class="hero-text">
              <h1 class="hero-title">Welcome to 百货小店</h1>
              <p class="hero-sub">
                A virtual goods shop for the Linux DO ecosystem
              </p>
            </div>
            <div class="hero-stats">
              <div class="visitor-pill">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="icon-sm visitor-icon"
                  aria-hidden="true"
                >
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                  <path d="M16 3.128a4 4 0 0 1 0 7.744"></path>
                  <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                </svg>
                <span class="visitor-count" id="visitor-count">0</span>
                <span class="visitor-label">Visitors</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Filter / Search bar -->
        <section class="filter-section">
          <div class="filter-card">
            <div class="filter-grid">
              <div class="search-wrap">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="search-icon"
                  aria-hidden="true"
                >
                  <path d="m21 21-4.34-4.34"></path>
                  <circle cx="11" cy="11" r="8"></circle>
                </svg>
                <input
                  type="text"
                  class="search-input"
                  placeholder="Search products..."
                  id="search-input"
                />
              </div>

              <div class="category-wrap">
                <div class="category-pill">
                  <div class="category-thumb"></div>
                  <button
                    type="button"
                    class="category-btn active"
                    data-cat="all"
                  >
                    All
                  </button>
                </div>
              </div>

              <div class="sort-wrap">
                <button
                  type="button"
                  class="sort-btn active"
                  data-sort="default"
                >
                  Default
                </button>
                <button type="button" class="sort-btn" data-sort="stock">
                  Stock
                </button>
                <button type="button" class="sort-btn" data-sort="sold">
                  Sold
                </button>
                <button type="button" class="sort-btn" data-sort="price-asc">
                  Price ↑
                </button>
                <button type="button" class="sort-btn" data-sort="price-desc">
                  Price ↓
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- Products -->
        <section class="products-section">
          <div class="products-header">
            <h2 class="products-title">Explore products</h2>
            <span class="result-badge" id="result-badge">0 results</span>
          </div>

          <div class="products-grid" id="products-grid">
            <!-- 空商品状态 -->
            <div class="empty-state">
              <div class="empty-icon" aria-hidden="true">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="m7.5 4.27 9 5.15"></path>
                  <path
                    d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"
                  ></path>
                  <path d="m3.3 7 8.7 5 8.7-5"></path>
                  <path d="M12 22V12"></path>
                </svg>
              </div>
              <p class="empty-title">暂无商品</p>
              <p class="empty-sub">店铺正在筹备中，商品上架后将在此展示。</p>
            </div>
          </div>
        </section>

        <!-- Pagination -->
        <nav class="pagination">
          <div class="page-info">
            <span class="page-label">Page 1 / 1</span>
          </div>
          <div class="page-buttons">
            <button type="button" class="page-btn" disabled>Prev</button>
            <button type="button" class="page-btn" disabled>Next</button>
          </div>
        </nav>
      </main>

      <!-- ============ Footer ============ -->
      <footer class="site-footer">
        <div class="container footer-inner">
          <p class="footer-text">
            Built for Linux DO ecosystem. Not an official service. Developed by
            chatgpt.org.uk.
          </p>
          <a
            href="#"
            class="footer-version"
            data-action="version"
            >v1.4.1</a
          >
        </div>
      </footer>

      <!-- ============ Mobile bottom nav ============ -->
      <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
        <div class="mbn-fade"></div>
        <div class="mbn-glow"></div>
        <div class="mbn-pill">
          <a class="mbn-item active" href="./" data-mbn="home">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="mbn-icon"
              aria-hidden="true"
            >
              <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path>
              <path
                d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
              ></path>
            </svg>
            <span>Home</span>
          </a>
          <a class="mbn-item" href="#" data-mbn="nav">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="mbn-icon"
              aria-hidden="true"
            >
              <path
                d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"
              ></path>
              <circle cx="12" cy="12" r="10"></circle>
            </svg>
            <span>LDC Nav</span>
          </a>
        </div>
      </nav>

      <!-- 简易 toast -->
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="./auth-config.js"></script>
    <script src="./auth.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
